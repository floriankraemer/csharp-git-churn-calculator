name: Release

on:
  push:
    tags:
      # SemVer without leading "v": 1.2.3
      - "[0-9]+.[0-9]+.[0-9]+"
      # Prerelease suffix after patch: 1.0.0-rc, 1.0.0-rc.1
      - "[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish for each RID
        run: |
          set -euxo pipefail
          for rid in win-x64 linux-x64 osx-x64 osx-arm64; do
            dotnet publish GitChurnCalculator.Console/GitChurnCalculator.Console.csproj \
              -c Release \
              -r "$rid" \
              --self-contained true \
              -o "dist/$rid"
          done

      - name: Package archives
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          mkdir -p release
          (cd dist/win-x64 && zip -r "../../release/GitChurnCalculator-${TAG}-win-x64.zip" .)
          tar -czvf "release/GitChurnCalculator-${TAG}-linux-x64.tar.gz" -C dist/linux-x64 .
          tar -czvf "release/GitChurnCalculator-${TAG}-osx-x64.tar.gz" -C dist/osx-x64 .
          tar -czvf "release/GitChurnCalculator-${TAG}-osx-arm64.tar.gz" -C dist/osx-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GitChurnCalculator ${{ github.ref_name }}
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
