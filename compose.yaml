# Bind-mount the repository at /src and run make targets (parity with make.ps1).
#
# Docker Compose v2:
#   docker compose build
#   docker compose run --rm dev make ci
#
# Podman:
#   podman compose build
#   podman compose run --rm dev make ci
#
# Replace `make ci` with any Makefile target (help, test, coverage, publish-single, …).

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: gitchurn-calculator:dev
    working_dir: /src
    volumes:
      - .:/src
